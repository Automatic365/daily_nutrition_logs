name: Trigger Dashboard Rebuild

on:
  push:
    paths:
      - 'daily_log.md'
    branches:
      - main

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate dispatch token exists
        env:
          DASHBOARD_PAT: ${{ secrets.DASHBOARD_PAT }}
        run: |
          if [ -z "$DASHBOARD_PAT" ]; then
            echo "::error::Missing DASHBOARD_PAT secret. Add a classic PAT with repo access to Automatic365/weight_cut_dashboard."
            exit 1
          fi

      - name: Trigger Weight Cut Dashboard Rebuild
        id: dispatch
        continue-on-error: true
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.DASHBOARD_PAT }}
          repository: Automatic365/weight_cut_dashboard
          event-type: update_logs

      - name: Fail with credential guidance
        if: steps.dispatch.outcome != 'success'
        run: |
          echo "::error::Repository dispatch failed. Rotate DASHBOARD_PAT and verify repo scope + org access for Automatic365/weight_cut_dashboard."
          echo "::error::Expected outcome: this workflow should create a repository_dispatch run in weight_cut_dashboard immediately."
          exit 1
